name: Refresh Clublog VU list

on:
  schedule:
    # Daily at 02:30 UTC (08:00 IST) — early morning in India so the
    # committed data is fresh for the morning audience.
    - cron: "30 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Prevent overlap with the monthly LoTW refresh or a manual kick-off.
concurrency:
  group: dxcc-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      WORK_DIR: dxcc

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ env.WORK_DIR }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ env.WORK_DIR }}
        run: pip install -r requirements.txt

      - name: Snapshot previous clublog.json
        working-directory: ${{ env.WORK_DIR }}
        run: |
          if [ -f clublog.json ]; then
            cp clublog.json clublog.previous.json
            echo "Preserved previous Clublog snapshot."
          else
            echo "No prior clublog.json — first-run baseline."
          fi

      - name: Scrape Clublog and regenerate artifacts
        working-directory: ${{ env.WORK_DIR }}
        run: |
          python clublog.py \
            --output VUDXCC-clublog-latest.pdf \
            --json clublog.json \
            --previous clublog.previous.json

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${WORK_DIR}/clublog.json" \
                  "${WORK_DIR}/clublog.previous.json" \
                  "${WORK_DIR}/VUDXCC-clublog-latest.pdf"
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh Clublog VU list ($(date -u +%Y-%m-%d))"

            # Rebase onto origin in case another refresh job committed first.
            for i in 1 2 3; do
              if git push origin HEAD; then
                echo "Pushed."
                break
              fi
              echo "Push rejected, rebasing and retrying…"
              git pull --rebase origin HEAD
            done
          fi
